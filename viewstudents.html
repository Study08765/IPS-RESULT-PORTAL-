<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Students</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6fb;
padding:20px;
}

.box{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#0b3d91;
color:white;
}
</style>

</head>

<body>

<div class="box">

<h2 align="center">All Students</h2>

<table>

<thead>

<tr>

<th>Roll</th>
<th>Name</th>
<th>Class</th>
<th>Result</th>

</tr>

</thead>

<tbody id="students">

</tbody>

</table>

</div>

<script type="module" src="view.js"></script>

</body>
</html>
